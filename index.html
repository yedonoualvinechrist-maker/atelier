<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AURUM CARD — L'excellence au quotidien</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #D4AF37;
      --gold-bright: #FFD700;
      --bg-dark: #121417;
      --surface: #1E2126;
      --text: #F8F9FA;
      --muted: #A0A0A0;
      --accent: rgba(212, 175, 55, 0.15);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: var(--bg-dark);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* --- NAVIGATION --- */
    nav {
      position: fixed; top: 0; width: 100%; z-index: 1000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.5rem 5%;
      backdrop-filter: blur(15px);
      background: rgba(18, 20, 23, 0.8);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem; font-weight: 600; letter-spacing: 2px;
      color: var(--gold); text-decoration: none;
    }
    .nav-links { display: flex; gap: 3rem; list-style: none; }
    .nav-links a {
      text-decoration: none; color: var(--text); font-size: 0.75rem;
      text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
    }
    .nav-links a:hover { color: var(--gold); }

    /* --- HERO --- */
    .hero {
      height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 0 5%; background: radial-gradient(circle at top right, #1e2530 0%, var(--bg-dark) 60%);
    }
    .hero-content { flex: 1; max-width: 600px; }
    .hero-visual { flex: 1; display: flex; justify-content: center; perspective: 1000px; }

    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 6vw, 5rem); line-height: 1.1; margin-bottom: 1.5rem;
    }
    .hero h1 span { color: var(--gold); font-style: italic; }

    /* --- CARTE 3D --- */
    .card-3d {
      width: 400px; height: 250px;
      background: linear-gradient(135deg, #2c2c2c 0%, #000 100%);
      border-radius: 20px; position: relative;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      transition: transform 0.1s ease-out;
      transform-style: preserve-3d;
      padding: 2rem; display: flex; flex-direction: column; justify-content: space-between;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .card-chip {
      width: 50px; height: 40px; background: linear-gradient(135deg, #e0c068, #b8860b);
      border-radius: 8px;
    }

    /* --- SIMULATEUR --- */
    .simulator { padding: 6rem 5%; background: var(--surface); text-align: center; }
    .sim-container {
      max-width: 800px; margin: 3rem auto;
      background: var(--bg-dark); padding: 3rem; border-radius: 20px;
      border: 1px solid var(--accent);
    }
    .range-slider { width: 100%; margin: 2rem 0; accent-color: var(--gold); cursor: pointer; }
    .earnings-box { font-size: 2.5rem; font-family: 'Cormorant Garamond', serif; color: var(--gold); }

    /* --- OFFRES --- */
    .plans { padding: 6rem 5%; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
    .plan-card {
      background: var(--surface); padding: 3rem 2rem; border-radius: 20px;
      transition: 0.4s; border: 1px solid transparent; text-align: center;
    }
    .plan-card:hover { transform: translateY(-10px); border-color: var(--gold); }
